<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>


<input class="nav-radio" type="radio" name="screen" id="screen-home" checked />

<input class="nav-radio" type="radio" name="screen" id="screen-folders-empty" />

<input class="nav-radio" type="radio" name="screen" id="screen-presets-empty" />

<input class="modal-radio" type="checkbox" id="modal-new-folder" />



<div class="app">



<section class="screen screen-home">


<header class="header">

<div class="logo">

<span class="logo-icon">
📁
</span>


<div>

<h1>
TaskFlow
</h1>


<p class="subtitle">
AI Workspace Manager
</p>


</div>


</div>

</header>



<div id="ai-container"></div>



<main class="home-actions">


<label class="action-card" for="screen-folders-empty">

<span class="action-icon save-icon">
📁
</span>


<span class="action-text">

<strong>
Manual Save
</strong>


<small>
Save tabs manually
</small>

</span>


<span class="chevron">
›
</span>


</label>





<label class="action-card" for="screen-presets-empty">


<span class="action-icon open-icon">
🤖
</span>


<span class="action-text">

<strong>
Open Preset
</strong>


<small>
Open AI workflows
</small>

</span>


<span class="chevron">
›
</span>


</label>



</main>


</section>








<section class="screen screen-folders-empty">


<header class="screen-header">


<label class="back-btn" for="screen-home">
←
</label>


<div>

<h2>
Choose a folder
</h2>


<p class="screen-subtitle">
Create a folder to save tabs
</p>


</div>


</header>





<div class="empty-state">


<div class="empty-icon">
📁
</div>


<p>
No folders yet
</p>


<p class="empty-hint">
Create your first folder
</p>


</div>





<ul class="item-list saved-list" id="folder-list"></ul>





<label 
class="primary-btn full-width" 
id="new-folder-button"
for="modal-new-folder">

+ Create Folder

</label>



</section>









<section class="screen screen-presets-empty">


<header class="screen-header">


<label class="back-btn" for="screen-home">
←
</label>


<div>


<h2>
Open Preset
</h2>


<p class="screen-subtitle">
Restore AI generated workflows
</p>


</div>


</header>





<div class="empty-state">


<div class="empty-icon">
🤖
</div>


<p>
No presets saved yet
</p>


<p class="empty-hint">
Accept an AI workflow first
</p>


</div>





<ul class="item-list saved-list" id="preset-list"></ul>





<label 
class="primary-btn full-width" 
for="screen-folders-empty">

Manual Save

</label>



</section>









<div class="modal">


<label 
class="modal-backdrop"
for="modal-new-folder">
</label>




<div class="modal-panel">


<h3>
New Folder
</h3>


<p class="modal-desc">
Name your manual workspace
</p>





<input 
id="folder-name"
type="text"
placeholder="Folder name"
maxlength="40"
/>





<div class="modal-actions">


<label 
class="ghost-btn"
for="modal-new-folder"
id="cancel">

Cancel

</label>




<button 
class="primary-btn"
id="create-folder">

Create

</button>



</div>



</div>



</div>





</div>



<script src="popup.js"></script>


</body>
</html>
